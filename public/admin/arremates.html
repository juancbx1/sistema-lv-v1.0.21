<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arremates</title>
    <link rel="stylesheet" href="/css/global-style.css">
    <link rel="stylesheet" href="/css/menu-lateral.css">
    <link rel="stylesheet" href="/css/arremates.css">
    <link rel="stylesheet" href="/css/popups.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="hamburger-menu">
        <i class="fas fa-bars"></i>
        <i class="fas fa-times"></i>
    </div>

    <main id="root" class="gs-card"></main>

    <!-- MODAL DE HISTÓRICO GERAL DE ARREMATES (fora do main para z-index correto) -->
    <div id="historicoArrematesModalContainer" class="popup-container" style="display: none;">
        <div class="popup-overlay"></div>
        <div class="oa-modal-historico">
            <div class="oa-modal-header">
                <h3 class="oa-modal-titulo">Histórico de Arremates</h3>
                <button id="btnFecharHistoricoArremates" class="oa-modal-fechar-btn">X</button>
            </div>
            <div class="oa-modal-filtros">
                <div class="oa-form-grupo" style="flex-grow: 2;">
                    <label for="filtroBuscaHistorico">Buscar por Produto ou Usuário</label>
                    <input type="text" id="filtroBuscaHistorico" class="oa-input" placeholder="Digite para buscar...">
                </div>
                <div class="oa-form-grupo">
                    <label for="filtroTipoEventoHistorico">Tipo de Evento</label>
                    <select id="filtroTipoEventoHistorico" class="oa-select">
                        <option value="todos">Todos os Eventos</option>
                        <option value="PRODUCAO">Lançamentos</option>
                        <option value="PERDA">Perdas</option>
                        <option value="ESTORNO">Estornos</option>
                    </select>
                </div>
                <div class="oa-form-grupo">
                    <label for="filtroPeriodoHistorico">Período</label>
                    <select id="filtroPeriodoHistorico" class="oa-select">
                        <option value="7d">Últimos 7 dias</option>
                        <option value="hoje">Hoje</option>
                        <option value="30d">Últimos 30 dias</option>
                        <option value="mes_atual">Este Mês</option>
                    </select>
                </div>
            </div>
            <div class="oa-modal-body">
                <div id="historicoArrematesTabelaWrapper" class="oa-tabela-wrapper"></div>
            </div>
            <div class="oa-modal-footer">
                <div id="historicoArrematesPaginacao" class="oa-paginacao-container"></div>
            </div>
        </div>
    </div>

    <!-- MODAL "MODO FOCO" (fora do main para z-index correto) -->
    <div id="modalModoFoco" class="popup-container" style="display: none;">
        <div class="popup-overlay"></div>
        <div class="oa-modal-foco">
            <div class="oa-modal-header">
                <div class="header-info-foco">
                    <img id="focoAvatar" src="/img/placeholder-image.png" alt="Avatar" class="avatar-tiktik">
                    <h3 id="focoTitulo" class="oa-modal-titulo">Desempenho Hoje</h3>
                </div>
                <button class="oa-modal-fechar-btn">X</button>
            </div>

            <div class="oa-modal-body-foco">
                <div id="focoMetricas" class="foco-metricas-grid"></div>

                <h4>Resumo do Dia por Produto</h4>
                <div id="focoResumoProdutos" class="foco-resumo-container">
                    <div class="spinner">Calculando resumo...</div>
                </div>

                <h4>Tarefas Finalizadas Hoje</h4>
                <div id="focoTarefas" class="oa-tabela-wrapper"></div>
            </div>
        </div>
    </div>

    <script src="/js/carregar-menu-lateral.js" type="module"></script>
    <script src="/js/admin-arremates.js" type="module"></script>
    <script src="/src/main-arremates.jsx" type="module"></script>
</body>
</html>
